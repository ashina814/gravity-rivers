<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0514" />
    <meta
      name="description"
      content="Gravity Rivers — a neon CRT visual toy. Draw rivers of gravity and watch colored orbs flow." />
    <meta name="color-scheme" content="dark" />

    <!-- open graph -->
    <meta property="og:title" content="Gravity Rivers" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Draw rivers of gravity. Watch the orbs find their way." />

    <title>TAJIMANIA / Gravity Rivers</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- stage -->
    <main id="stage">
      <canvas id="scene" aria-label="Gravity Rivers canvas"></canvas>

      <!-- Title Screen -->
      <section id="title-screen" class="title-screen">
        <div class="title-content">
          <h1 class="glitch-text" data-text="TAJIMANIA">TAJIMANIA</h1>
          <div class="subtitle">STEAMPUNK BRAWLER</div><br>
          <button id="btn-start" class="btn-start">SYSTEM START</button>
          <br><br>
          <button id="btn-tutorial-open" class="btn-secondary">HOW TO PLAY</button>
        </div>
      </section>

      <!-- Game Over Screen -->
      <section id="gameover-screen" class="gameover-screen hidden">
        <h2 class="go-title">SYSTEM DOWN</h2>
        <div class="go-stats">
          SCORE: <span id="go-score">0</span><br>
          MAX COMBO: <span id="go-combo">0</span>
        </div>
        <div class="go-actions">
          <button id="btn-restart" class="btn-start">REBOOT</button>
          <button id="btn-share" class="btn-share">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            SHARE
          </button>
        </div>
      </section>
      
      <!-- Game HUD (hidden on boot) -->
      <div id="hud" class="hud" style="display: none;">
        <div class="hud-left">
          <div class="stat">
            <div class="stat-label">COMBO</div>
            <div class="stat-val" id="level-count">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-val" id="score-count">0</div>
          </div>
        </div>

        <div class="hud-right">
          <div id="hint" class="hint">DRAW a line ·  release to channel</div>
          <div id="bloom-banner" class="bloom-banner"></div>
        </div>
      </div>

      <!-- dock removed for Issen mode -->

      <!-- Tutorial panel -->
      <section class="panel hidden" id="panel-tutorial" role="dialog" aria-hidden="true" style="width: 460px;">
        <header class="panel-head">
          <div class="panel-title" style="color: var(--cyan); text-shadow: 0 0 8px var(--cyan); letter-spacing: 4px;">HOW TO PLAY</div>
          <button class="panel-close" id="btn-tutorial-close" aria-label="Close">×</button>
        </header>
        <div class="panel-body">
          <div class="tutorial-text">
            <p>
              <span class="key" style="color:var(--cyan); border: 1px solid var(--cyan);">MOVE</span> 
              <span class="desc"><strong style="color:var(--cyan)">[ マウス移動 ]</strong> 自動追従</span>
            </p>
            <p>
              <span class="key" style="color:var(--pink); border: 1px solid var(--pink);">IAI-SLASH</span> 
              <span class="desc"><strong style="color:var(--pink)">[ 左クリック長押し ]</strong> 極・スローモーション。レーザーで狙いを定め、離して一閃。</span>
            </p>
            <p>
              <span class="key" style="color:var(--yellow); border: 1px solid var(--yellow);">ONE HIT KILL</span> 
              <span class="desc"><strong style="color:var(--yellow)">[ リスク ]</strong> 敵に触れると即死する</span>
            </p>
          </div>
        </div>
      </section>

      <!-- settings panel -->
      <section class="panel hidden" id="panel-settings" role="dialog" aria-hidden="true">
        <header class="panel-head">
          <div class="panel-title">SETTINGS</div>
          <button class="panel-close" id="panel-close" aria-label="Close">×</button>
        </header>
        <div class="panel-body">
          <div class="field">
            <label for="in-spawn-rate">SPAWN RATE</label>
            <input id="in-spawn-rate" type="range" min="0" max="100" step="1" />
            <div class="val" id="val-spawn-rate"></div>
          </div>
          <div class="field">
            <label for="in-gravity">GRAVITY</label>
            <input id="in-gravity" type="range" min="0" max="100" step="1" />
            <div class="val" id="val-gravity"></div>
          </div>
          <div class="field">
            <label for="in-line-life">LINE LIFE</label>
            <input id="in-line-life" type="range" min="0" max="100" step="1" />
            <div class="val" id="val-line-life"></div>
          </div>
          <div class="field">
            <label for="in-trail">TRAIL GLOW</label>
            <input id="in-trail" type="range" min="0" max="100" step="1" />
            <div class="val" id="val-trail"></div>
          </div>
          <div class="field">
            <label for="in-volume">VOLUME</label>
            <input id="in-volume" type="range" min="0" max="100" step="1" />
            <div class="val" id="val-volume"></div>
          </div>
          <div class="field">
            <label for="in-bgm">AMBIENT BGM</label>
            <input id="in-bgm" type="checkbox" />
            <div class="val" id="val-bgm"></div>
          </div>
          <div class="field">
            <label for="in-palette">PALETTE</label>
            <select id="in-palette">
              <option value="neon">NEON</option>
              <option value="candy">CANDY</option>
              <option value="lava">LAVA</option>
              <option value="ocean">OCEAN</option>
              <option value="mono">MONO</option>
            </select>
            <div class="val"></div>
          </div>
          <div class="field">
            <label for="in-crt">CRT POSTFX</label>
            <input id="in-crt" type="checkbox" />
            <div class="val" id="val-crt"></div>
          </div>
          <div class="field">
            <label for="in-bloom">BLOOM</label>
            <input id="in-bloom" type="checkbox" />
            <div class="val" id="val-bloom"></div>
          </div>
          <div class="field full">
            <button class="btn-wide" id="btn-reset-config">RESET TO DEFAULTS</button>
          </div>
        </div>
        <footer class="panel-foot">
          <span>KEYS</span>
          <kbd>D</kbd> DRAW
          <kbd>E</kbd> ERASE
          <kbd>C</kbd> CLEAR
          <kbd>S</kbd> SNAP
          <kbd>⎵</kbd> PAUSE
          <kbd>,</kbd> CFG
        </footer>
      </section>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
