<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0514" />
    <meta
      name="description"
      content="Gravity Rivers — a neon CRT visual toy. Draw rivers of gravity and watch colored orbs flow." />
    <meta name="color-scheme" content="dark" />

    <!-- open graph -->
    <meta property="og:title" content="Gravity Rivers" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Draw rivers of gravity. Watch the orbs find their way." />

    <title>Gravity Rivers</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- stage -->
    <main id="stage">
      <canvas id="scene" aria-label="Gravity Rivers canvas"></canvas>

      <!-- Title Screen Overlay -->
      <div id="title-screen" class="title-screen">
        <div class="title-content">
          <h1 class="glitch-text" data-text="TAJIMANIA">TAJIMANIA</h1>
          <p class="subtitle">STEAMPUNK CHAIN-REACTION BRAWLER</p>
          <button id="btn-start" class="btn-start">CLICK TO START ENGINE</button>
        </div>
      </div>
      
      <!-- Game HUD (hidden on boot) -->
      <div id="hud" class="hud" style="display: none;">
        <div class="hud-left">
          <div class="meter" id="ink-meter" aria-label="Ink meter">
            <div class="meter-label">INK</div>
            <div class="meter-bar"><div class="meter-fill" id="ink-fill"></div></div>
            <div class="meter-value" id="ink-value">100%</div>
          </div>
          <div class="stat">
            <div class="stat-label">LEVEL</div>
            <div class="stat-val" id="level-count">1</div>
          </div>
          <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-val" id="score-count">0</div>
          </div>
        </div>

        <div class="hud-right">
          <div id="hint" class="hint">DRAW a line ·  release to channel</div>
          <div id="bloom-banner" class="bloom-banner"></div>
        </div>
      </div>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
