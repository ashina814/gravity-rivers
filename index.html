<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0514" />
    <meta
      name="description"
      content="Gravity Rivers — a neon CRT visual toy. Draw rivers of gravity and watch colored orbs flow." />
    <meta name="color-scheme" content="dark" />

    <!-- open graph -->
    <meta property="og:title" content="Gravity Rivers" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Draw rivers of gravity. Watch the orbs find their way." />

    <title>Gravity Rivers</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- stage -->
    <main id="stage">
      <canvas id="scene" aria-label="Gravity Rivers canvas"></canvas>

      <!-- Title Screen Overlay -->
      <div id="title-screen" class="title-screen">
        <div class="title-content">
          <h1 class="glitch-text" data-text="TAJIMANIA">TAJIMANIA</h1>
          <p class="subtitle">STEAMPUNK CHAIN-REACTION BRAWLER</p>
          <button id="btn-start" class="btn-start">CLICK TO START ENGINE</button>
        </div>
      </div>
      
      <!-- Game HUD (hidden on boot) -->
      <div id="hud" class="hud" style="display: none;">
        <div class="hud-left">
          <div class="meter" id="ink-meter" aria-label="Ink meter">
            <div class="meter-label">INK</div>
            <div class="meter-bar"><div class="meter-fill" id="ink-fill"></div></div>
            <div class="meter-value" id="ink-value">100%</div>
          </div>
          <div class="stat">
            <div class="stat-label">LEVEL</div>
            <div class="stat-val" id="level-count">1</div>
          </div>
          <div class="stat">
            <div class="stat-label">SCORE</div>
            <div class="stat-val" id="score-count">0</div>
          </div>
        </div>

        <div class="hud-right">
          <div id="hint" class="hint">DRAW a line ·  release to channel</div>
          <div id="bloom-banner" class="bloom-banner"></div>
        </div>
      </div>

      <!-- Tool Dock -->
      <div class="dock" id="dock" aria-label="Tool dock">
        <button class="tool active" data-tool="draw" title="Draw Tool (1)">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
          DRAW
        </button>
        <button class="tool" data-tool="erase" title="Eraser Tool (2)">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20"/></svg>
          ERASE
        </button>
        <div class="dock-sep"></div>
        <button class="tool" id="btn-pause" title="Pause / Resume (Space)">
          <svg width="24" height="24" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          PAUSE
        </button>
        <button class="tool" id="btn-clear" title="Clear All Lines (C)">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          CLEAR
        </button>
        <button class="tool" id="btn-snap" title="Download Snapshot (P)">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          SNAP
        </button>
        <button class="tool" id="btn-settings" title="Open Settings (Esc)">
          <svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          SETTING
        </button>
      </div>

      <!-- Settings Panel -->
      <div class="panel hidden" id="panel" aria-label="Settings panel">
        <div class="panel-head">
          <div class="panel-title">SYSTEM_CONFIG</div>
          <button class="panel-close" id="btn-close-panel" aria-label="Close settings">&times;</button>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="opt-palette">COLOR SCHEME</label>
            <select id="opt-palette">
              <option value="cyberpunk">CYBERPUNK</option>
              <option value="matrix">MATRIX</option>
              <option value="neon">NEON TOKYO</option>
            </select>
          </div>
          <div class="field">
            <label for="opt-bgm">BGM</label>
            <input type="checkbox" id="opt-bgm" checked />
          </div>
          <div class="field full">
            <label for="opt-vol">MASTER VOLUME <span class="val" id="vol-val">50%</span></label>
            <input type="range" id="opt-vol" min="0" max="1" step="0.05" value="0.5" />
          </div>
        </div>
      </div>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
